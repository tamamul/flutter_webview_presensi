name: Flutter APK Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.6'
      
      - name: Regenerate Android folder with V2 embedding
        run: |
          # Backup konfigurasi penting
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            cp android/app/src/main/AndroidManifest.xml AndroidManifest.xml.backup
          fi
          
          # Hapus folder android yang lama
          rm -rf android/
          
          # Buat ulang project dengan V2 embedding
          flutter create --platforms=android --org=com.marsa9 .
          
          # Restore AndroidManifest.xml jika ada backup
          if [ -f AndroidManifest.xml.backup ]; then
            cp AndroidManifest.xml.backup android/app/src/main/AndroidManifest.xml
          fi
          
          # Pastikan MainActivity.kt sudah benar
          cat > android/app/src/main/kotlin/com/marsa9/presensi/MainActivity.kt << 'EOF'
          package com.marsa9.presensi
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity()
          EOF
      
      - run: flutter pub get
      
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk