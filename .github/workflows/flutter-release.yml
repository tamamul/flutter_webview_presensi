name: Flutter APK Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Create MainActivity.kt
        run: |
          mkdir -p android/app/src/main/kotlin/com/marsa9/presensi
          cat > android/app/src/main/kotlin/com/marsa9/presensi/MainActivity.kt << 'EOF'
          package com.marsa9.presensi
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity()
          EOF
      
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.19.6'  # Versi stabil yang didukung
      
      - run: flutter pub get
      
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk