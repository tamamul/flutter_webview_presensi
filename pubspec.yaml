name: presensi_marsa
description: Aplikasi Presensi SMK Ma'arif 9 Kebumen
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebView
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0
  
  # Permission handling
  permission_handler: ^11.3.0
  
  # Notifikasi lokal
  flutter_local_notifications: ^17.2.2
  
  # Kamera
  camera: ^0.10.5+9
  
  # Lokasi
  geolocator: ^12.0.0
  
  # UI & Animasi
  animated_splash_screen: ^1.3.0
  lottie: ^3.1.2
  
  # Utilitas
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/images/logo_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
